<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SineMatch — Film & Dizi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.0.0/dist/tabler-icons.min.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0f0f0e;
  --surface: #191918;
  --surface2: #222220;
  --surface3: #2a2a28;
  --text: #f0efe8;
  --text2: #888884;
  --text3: #555552;
  --accent: #e8c547;
  --accent2: #c9a52a;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --radius: 10px;
  --radius-lg: 14px;
  --radius-xl: 20px;
}

body {
  background: var(--bg);
  font-family: 'DM Sans', sans-serif;
  color: var(--text);
  min-height: 100vh;
}

/* NAV */
nav {
  position: sticky; top: 0; z-index: 50;
  background: rgba(15,15,14,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 0 2rem;
  height: 58px;
  display: flex; align-items: center; gap: 2rem;
}
.nav-logo {
  font-family: 'DM Serif Display', serif;
  font-size: 20px;
  color: var(--accent);
  letter-spacing: -0.5px;
  flex-shrink: 0;
}
.nav-logo span { color: var(--text2); font-style: italic; }
.nav-tabs { display: flex; gap: 2px; }
.nav-tab {
  padding: 6px 14px; border-radius: 8px;
  font-size: 13px; font-weight: 500;
  color: var(--text2); cursor: pointer;
  border: none; background: none;
  font-family: inherit;
  transition: color .15s, background .15s;
}
.nav-tab:hover { color: var(--text); background: var(--surface2); }
.nav-tab.active { color: var(--accent); background: rgba(232,197,71,0.1); }
.nav-search-wrap { margin-left: auto; position: relative; }
.nav-search-wrap i { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 15px; color: var(--text3); pointer-events: none; }
.nav-search {
  width: 220px; padding: 7px 12px 7px 32px;
  background: var(--surface2); border: 1px solid var(--border2);
  border-radius: 8px; color: var(--text); font-size: 13px;
  font-family: inherit; outline: none;
  transition: border-color .15s, width .2s;
}
.nav-search:focus { border-color: var(--accent); width: 280px; }
.nav-search::placeholder { color: var(--text3); }

/* HERO SEARCH (sadece arama tabında gösterilir) */
.hero-search {
  display: none;
  padding: 3rem 2rem 2rem;
  max-width: 800px; margin: 0 auto;
  text-align: center;
}
.hero-search.visible { display: block; }
.hero-title {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(28px, 5vw, 44px);
  line-height: 1.15;
  margin-bottom: 8px;
}
.hero-title em { color: var(--accent); font-style: italic; }
.hero-sub { font-size: 15px; color: var(--text2); margin-bottom: 28px; }
.hero-input-wrap { position: relative; max-width: 560px; margin: 0 auto 16px; }
.hero-input-wrap i { position: absolute; left: 16px; top: 50%; transform: translateY(-50%); font-size: 20px; color: var(--text3); pointer-events: none; }
.hero-input {
  width: 100%; padding: 14px 20px 14px 48px;
  background: var(--surface); border: 1px solid var(--border2);
  border-radius: var(--radius-xl); color: var(--text); font-size: 16px;
  font-family: inherit; outline: none;
  transition: border-color .15s;
}
.hero-input:focus { border-color: var(--accent); }
.hero-input::placeholder { color: var(--text3); }
.hero-site-pills { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; margin-top: 12px; }
.hero-pill {
  padding: 5px 12px; border-radius: 999px;
  font-size: 12px; color: var(--text2);
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; transition: .15s;
  display: flex; align-items: center; gap: 5px;
}
.hero-pill:hover, .hero-pill.active { border-color: var(--accent); color: var(--accent); background: rgba(232,197,71,0.08); }

/* SEARCH RESULTS */
.search-results-section {
  display: none;
  max-width: 1280px; margin: 0 auto; padding: 0 2rem 4rem;
}
.search-results-section.visible { display: block; }
.search-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; padding-top: 1rem; }
.search-header h2 { font-size: 16px; font-weight: 500; color: var(--text2); }
.search-header strong { color: var(--text); }
.search-type-tabs { display: flex; gap: 6px; margin-left: auto; }
.stt {
  padding: 5px 14px; border-radius: 8px; font-size: 13px;
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text2); cursor: pointer; font-family: inherit;
  transition: .15s;
}
.stt:hover { color: var(--text); }
.stt.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 600; }

/* MAIN CONTENT */
main { max-width: 1280px; margin: 0 auto; padding: 0 2rem 4rem; }

.section { margin-bottom: 3rem; }
.section-header { display: flex; align-items: baseline; gap: 10px; margin-bottom: 1.25rem; }
.section-title {
  font-family: 'DM Serif Display', serif;
  font-size: 22px; font-weight: 400;
}
.section-count { font-size: 13px; color: var(--text3); }
.section-sort { margin-left: auto; }
.section-sort select {
  padding: 5px 10px; border-radius: 8px;
  background: var(--surface2); border: 1px solid var(--border);
  color: var(--text2); font-size: 12px; font-family: inherit;
  cursor: pointer; outline: none;
}

/* GRID */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(148px, 1fr));
  gap: 14px;
}
.card {
  background: var(--surface);
  border-radius: var(--radius-lg);
  border: 1px solid var(--border);
  overflow: hidden; cursor: pointer;
  transition: border-color .2s, transform .2s;
  display: block; color: inherit; text-decoration: none;
}
.card:hover { border-color: var(--border2); transform: translateY(-3px); }
.poster-wrap { width: 100%; aspect-ratio: 2/3; overflow: hidden; background: var(--surface2); position: relative; }
.poster-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .3s; }
.card:hover .poster-wrap img { transform: scale(1.04); }
.no-poster { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; color: var(--text3); font-size: 32px; }
.new-badge {
  position: absolute; top: 8px; left: 8px;
  background: var(--accent); color: #000;
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 999px;
  letter-spacing: 0.5px;
}
.info { padding: 10px 11px 12px; }
.card-title { font-size: 13px; font-weight: 500; line-height: 1.35; margin-bottom: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meta { display: flex; align-items: center; gap: 5px; flex-wrap: wrap; font-size: 11px; color: var(--text2); }
.badge {
  padding: 2px 6px; border-radius: 5px; font-size: 10px; font-weight: 600;
  background: rgba(232,197,71,0.12); color: var(--accent);
  letter-spacing: 0.3px;
}
.badge.tv { background: rgba(100,180,255,0.1); color: #64b4ff; }
.rating { display: flex; align-items: center; gap: 2px; }
.rating i { font-size: 10px; color: var(--accent); }

/* STATE */
.state { text-align: center; padding: 4rem 1rem; color: var(--text2); font-size: 14px; grid-column: 1/-1; }
.state i { font-size: 36px; display: block; margin: 0 auto 12px; color: var(--text3); }

/* MODAL */
.modal-backdrop {
  display: none; position: fixed; inset: 0;
  background: rgba(0,0,0,0.7); z-index: 200;
  align-items: center; justify-content: center; padding: 1rem;
  backdrop-filter: blur(4px);
}
.modal-backdrop.open { display: flex; }
.modal {
  background: var(--surface); border-radius: var(--radius-xl);
  border: 1px solid var(--border2);
  width: 100%; max-width: 440px; overflow: hidden;
  animation: modalIn .2s ease;
}
@keyframes modalIn { from { opacity: 0; transform: scale(.96) translateY(8px); } to { opacity: 1; transform: none; } }
.modal-header {
  display: flex; align-items: center; gap: 14px;
  padding: 18px 18px 14px;
  border-bottom: 1px solid var(--border);
}
.modal-poster { width: 52px; height: 78px; object-fit: cover; border-radius: 8px; flex-shrink: 0; }
.modal-poster-ph { width: 52px; height: 78px; border-radius: 8px; background: var(--surface2); display: flex; align-items: center; justify-content: center; color: var(--text3); flex-shrink: 0; }
.modal-info { flex: 1; min-width: 0; }
.modal-title { font-size: 15px; font-weight: 600; line-height: 1.35; margin-bottom: 4px; }
.modal-meta { font-size: 12px; color: var(--text2); }
.modal-close {
  margin-left: auto; align-self: flex-start;
  background: var(--surface2); border: 1px solid var(--border);
  cursor: pointer; color: var(--text2);
  font-size: 16px; padding: 6px; border-radius: 8px;
  flex-shrink: 0; line-height: 1;
  transition: color .15s, background .15s;
}
.modal-close:hover { color: var(--text); background: var(--surface3); }
.modal-body { padding: 16px 18px 20px; }
.modal-label { font-size: 12px; color: var(--text2); margin-bottom: 12px; font-weight: 500; letter-spacing: 0.3px; text-transform: uppercase; }
.site-list { display: flex; flex-direction: column; gap: 8px; }
.site-btn {
  display: flex; align-items: center; gap: 12px;
  padding: 11px 14px; border-radius: var(--radius);
  border: 1px solid var(--border2); background: var(--surface2);
  color: var(--text); text-decoration: none; font-size: 14px;
  transition: border-color .15s, background .15s;
}
.site-btn:hover { border-color: var(--accent); background: rgba(232,197,71,0.05); }
.site-icon { width: 20px; height: 20px; border-radius: 4px; object-fit: contain; flex-shrink: 0; }
.site-name { font-weight: 500; flex: 1; }
.site-desc { font-size: 11px; color: var(--text2); margin-top: 1px; }
.site-btn .ti { color: var(--text3); font-size: 14px; }

@media (max-width: 600px) {
  nav { padding: 0 1rem; gap: 1rem; }
  .nav-search { width: 160px; }
  .nav-search:focus { width: 200px; }
  main, .search-results-section { padding: 0 1rem 3rem; }
  .grid { grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; }
  .hero-search { padding: 2rem 1rem 1.5rem; }
}
</style>
</head>
<body>

<nav>
  <div class="nav-logo">Sine<span>Match</span></div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="switchView('home',this)">Ana Sayfa</button>
    <button class="nav-tab" onclick="switchView('search',this)">Ara</button>
  </div>
  <div class="nav-search-wrap">
    <i class="ti ti-search"></i>
    <input class="nav-search" type="text" placeholder="Hızlı ara..." id="navSearch" oninput="onNavSearch(this.value)">
  </div>
</nav>

<!-- ARAMA VIEW -->
<div class="hero-search" id="heroSearch">
  <h1 class="hero-title">Film & Dizi <em>bul,</em><br>nerede izleyeceğini keşfet</h1>
  <p class="hero-sub">Binlerce içeriği Türkçe izleme sitelerinde arayın</p>
  <div class="hero-input-wrap">
    <i class="ti ti-search"></i>
    <input class="hero-input" type="text" id="heroInput" placeholder="Film veya dizi adı yaz..." oninput="onHeroSearch(this.value)" autocomplete="off">
  </div>
  <div class="hero-site-pills" id="sitePills"></div>
</div>

<div class="search-results-section" id="searchResultsSection">
  <div class="search-header">
    <h2 id="searchHeaderText"></h2>
    <div class="search-type-tabs">
      <button class="stt active" onclick="switchSearchType('all',this)">Tümü</button>
      <button class="stt" onclick="switchSearchType('movie',this)">Film</button>
      <button class="stt" onclick="switchSearchType('tv',this)">Dizi</button>
    </div>
  </div>
  <div class="grid" id="searchGrid"></div>
</div>

<!-- ANA SAYFA VIEW -->
<main id="homeView">
  <div class="section" id="movieSection">
    <div class="section-header">
      <h2 class="section-title">Yeni Filmler</h2>
      <span class="section-count" id="movieCount"></span>
      <div class="section-sort">
        <select id="movieSort" onchange="renderMovies()">
          <option value="date">En yeni</option>
          <option value="rating">Puan</option>
          <option value="alpha">A-Z</option>
        </select>
      </div>
    </div>
    <div class="grid" id="movieGrid"><div class="state"><i class="ti ti-loader-2"></i>Yükleniyor...</div></div>
  </div>

  <div class="section" id="tvSection">
    <div class="section-header">
      <h2 class="section-title">Yeni Diziler</h2>
      <span class="section-count" id="tvCount"></span>
      <div class="section-sort">
        <select id="tvSort" onchange="renderShows()">
          <option value="date">En yeni</option>
          <option value="rating">Puan</option>
          <option value="alpha">A-Z</option>
        </select>
      </div>
    </div>
    <div class="grid" id="tvGrid"><div class="state"><i class="ti ti-loader-2"></i>Yükleniyor...</div></div>
  </div>
</main>

<!-- MODAL -->
<div class="modal-backdrop" id="modalBackdrop" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-header">
      <div id="modalPosterWrap"></div>
      <div class="modal-info">
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-meta" id="modalMeta"></div>
      </div>
      <button class="modal-close" onclick="closeModalDirect()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="modal-label">Platform seç</div>
      <div class="site-list" id="siteList"></div>
    </div>
  </div>
</div>

<script>
const API_KEY = '500330721680edb6d5f7f12ba7cd9023';
const BASE    = 'https://api.themoviedb.org/3';
const IMG     = 'https://image.tmdb.org/t/p/w342';

let movies = [], shows = [];
let currentView = 'home';
let searchType = 'all';
let searchTimer = null;
let searchCache = {};

// İzleme siteleri
const SITES = [
  {
    name: 'Dizipal',
    desc: 'Türkçe altyazı & dublaj',
    icon: 'https://www.google.com/s2/favicons?sz=32&domain=dizipal.com',
    url: (title, origTitle) => `https://t.ly/dizipalgiris/?s=${encodeURIComponent(origTitle||title)}`
  },
  {
    name: 'HDFilmCehennemi',
    desc: 'Film & dizi arşivi',
    icon: 'https://www.google.com/s2/favicons?sz=32&domain=hdfilmcehennemi.nl',
    url: (title, origTitle) => `https://www.hdfilmcehennemi.nl/?s=${encodeURIComponent(origTitle||title)}`
  },
  {
    name: 'SevenFlix',
    desc: 'Yüksek kalite içerik',
    icon: 'https://www.google.com/s2/favicons?sz=32&domain=sevenflix.net',
    url: (title, origTitle) => `https://sevenflix.net/?s=${encodeURIComponent(origTitle||title)}`
  },
  {
    name: 'FilmModu',
    desc: 'Türkçe dublaj seçeneği',
    icon: 'https://www.google.com/s2/favicons?sz=32&domain=filmmodu.com',
    url: (title, origTitle) => `https://www.filmmodu.com/?s=${encodeURIComponent(origTitle||title)}`
  },
  {
    name: 'DiziBox',
    desc: 'Dizi & film platformu',
    icon: 'https://www.google.com/s2/favicons?sz=32&domain=dizibox.pro',
    url: (title, origTitle) => `https://www.dizibox.pro/?s=${encodeURIComponent(origTitle||title)}`
  },
  {
    name: 'FullHDFilmizlesene',
    desc: 'Geniş film kataloğu',
    icon: 'https://www.google.com/s2/favicons?sz=32&domain=fullhdfilmizlesene.com',
    url: (title, origTitle) => `https://www.fullhdfilmizlesene.com/?s=${encodeURIComponent(origTitle||title)}`
  }
];

// Site pills oluştur (arama sayfası)
function buildSitePills() {
  const wrap = document.getElementById('sitePills');
  wrap.innerHTML = SITES.map(s =>
    `<div class="hero-pill"><img src="${s.icon}" style="width:14px;height:14px;border-radius:3px" onerror="this.style.display='none'">${s.name}</div>`
  ).join('');
}

// Nav arama
function onNavSearch(val) {
  if (val.trim().length > 1) {
    switchView('search', null);
    document.getElementById('heroInput').value = val;
    triggerSearch(val.trim());
  }
}

// Hero arama
function onHeroSearch(val) {
  clearTimeout(searchTimer);
  document.getElementById('navSearch').value = val;
  if (!val.trim() || val.trim().length < 2) {
    document.getElementById('searchResultsSection').classList.remove('visible');
    return;
  }
  searchTimer = setTimeout(() => triggerSearch(val.trim()), 350);
}

async function triggerSearch(q) {
  const cacheKey = q + '_' + searchType;
  if (searchCache[cacheKey]) {
    renderSearchResults(searchCache[cacheKey], q);
    return;
  }
  document.getElementById('searchResultsSection').classList.add('visible');
  document.getElementById('searchGrid').innerHTML = `<div class="state"><i class="ti ti-loader-2"></i>Aranıyor...</div>`;
  document.getElementById('searchHeaderText').innerHTML = `<strong>"${q}"</strong> için sonuçlar`;

  try {
    const [mRes, tRes] = await Promise.all([
      fetch(`${BASE}/search/movie?api_key=${API_KEY}&language=tr-TR&query=${encodeURIComponent(q)}&page=1`).then(r=>r.json()),
      fetch(`${BASE}/search/tv?api_key=${API_KEY}&language=tr-TR&query=${encodeURIComponent(q)}&page=1`).then(r=>r.json()),
    ]);
    const results = [
      ...(mRes.results||[]).map(m=>({...m,mediaType:'movie'})),
      ...(tRes.results||[]).map(s=>({...s,mediaType:'tv'}))
    ].sort((a,b)=>(b.popularity||0)-(a.popularity||0));
    searchCache[cacheKey] = results;
    renderSearchResults(results, q);
  } catch {
    document.getElementById('searchGrid').innerHTML = `<div class="state"><i class="ti ti-wifi-off"></i>Arama başarısız.</div>`;
  }
}

function switchSearchType(type, el) {
  searchType = type;
  document.querySelectorAll('.stt').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  const q = document.getElementById('heroInput').value.trim() || document.getElementById('navSearch').value.trim();
  if (q.length > 1) triggerSearch(q);
}

function renderSearchResults(items, q) {
  let filtered = [...items];
  if (searchType === 'movie') filtered = filtered.filter(i=>i.mediaType==='movie');
  if (searchType === 'tv') filtered = filtered.filter(i=>i.mediaType==='tv');

  document.getElementById('searchHeaderText').innerHTML = `<strong>"${q}"</strong> için <strong>${filtered.length}</strong> sonuç`;
  const grid = document.getElementById('searchGrid');
  if (!filtered.length) { grid.innerHTML = `<div class="state"><i class="ti ti-search-off"></i>Sonuç bulunamadı.</div>`; return; }
  grid.innerHTML = filtered.map(item => cardHTML(item)).join('');
}

// Ana sayfa verileri
async function init() {
  try {
    const [mv1, mv2, tv1, tv2] = await Promise.all([
      fetch(`${BASE}/movie/now_playing?api_key=${API_KEY}&language=tr-TR&page=1`).then(r=>r.json()),
      fetch(`${BASE}/movie/now_playing?api_key=${API_KEY}&language=tr-TR&page=2`).then(r=>r.json()),
      fetch(`${BASE}/tv/on_the_air?api_key=${API_KEY}&language=tr-TR&page=1`).then(r=>r.json()),
      fetch(`${BASE}/tv/on_the_air?api_key=${API_KEY}&language=tr-TR&page=2`).then(r=>r.json()),
    ]);
    movies = [...(mv1.results||[]), ...(mv2.results||[])].map(m=>({...m,mediaType:'movie'}));
    shows  = [...(tv1.results||[]), ...(tv2.results||[])].map(s=>({...s,mediaType:'tv'}));
    renderMovies();
    renderShows();
  } catch {
    document.getElementById('movieGrid').innerHTML = `<div class="state"><i class="ti ti-wifi-off"></i>Yüklenemedi.</div>`;
    document.getElementById('tvGrid').innerHTML = `<div class="state"><i class="ti ti-wifi-off"></i>Yüklenemedi.</div>`;
  }
}

function sortItems(items, sort) {
  const arr = [...items];
  if (sort === 'rating') return arr.sort((a,b)=>(b.vote_average||0)-(a.vote_average||0));
  if (sort === 'alpha') return arr.sort((a,b)=>(a.title||a.name||'').localeCompare(b.title||b.name||'','tr'));
  return arr.sort((a,b)=>{
    const da = a.release_date||a.first_air_date||'';
    const db = b.release_date||b.first_air_date||'';
    return db.localeCompare(da);
  });
}

function renderMovies() {
  const sort = document.getElementById('movieSort').value;
  const sorted = sortItems(movies, sort);
  document.getElementById('movieCount').textContent = `${sorted.length} film`;
  document.getElementById('movieGrid').innerHTML = sorted.map(item=>cardHTML(item, true)).join('') || `<div class="state"><i class="ti ti-photo-off"></i>İçerik yok.</div>`;
}

function renderShows() {
  const sort = document.getElementById('tvSort').value;
  const sorted = sortItems(shows, sort);
  document.getElementById('tvCount').textContent = `${sorted.length} dizi`;
  document.getElementById('tvGrid').innerHTML = sorted.map(item=>cardHTML(item, true)).join('') || `<div class="state"><i class="ti ti-photo-off"></i>İçerik yok.</div>`;
}

// Kart HTML'i
function cardHTML(item, showNewBadge=false) {
  const title  = item.title || item.name || '—';
  const year   = (item.release_date || item.first_air_date || '').substring(0, 4);
  const rating = item.vote_average ? Math.round(item.vote_average * 10) / 10 : null;
  const isFilm = item.mediaType === 'movie';
  const isNew  = showNewBadge && isRecentlyAdded(item.release_date || item.first_air_date);
  const dataAttr = encodeURIComponent(JSON.stringify({
    id: item.id, title,
    origTitle: item.original_title || item.original_name || title,
    year, rating, mediaType: item.mediaType, poster: item.poster_path || ''
  }));
  const poster = item.poster_path
    ? `<img src="${IMG}${item.poster_path}" alt="${title}" loading="lazy">`
    : `<div class="no-poster"><i class="ti ti-photo-off"></i></div>`;
  return `<div class="card" onclick="openModal(decodeURIComponent('${dataAttr}'))">
    <div class="poster-wrap">
      ${poster}
      ${isNew ? '<span class="new-badge">YENİ</span>' : ''}
    </div>
    <div class="info">
      <div class="card-title" title="${title}">${title}</div>
      <div class="meta">
        <span class="badge${isFilm?'':' tv'}">${isFilm?'FİLM':'DİZİ'}</span>
        ${year ? `<span>${year}</span>` : ''}
        ${rating ? `<span class="rating"><i class="ti ti-star-filled"></i>${rating}</span>` : ''}
      </div>
    </div>
  </div>`;
}

function isRecentlyAdded(dateStr) {
  if (!dateStr) return false;
  const diff = (Date.now() - new Date(dateStr)) / (1000*60*60*24);
  return diff <= 30;
}

// View geçişi
function switchView(view, el) {
  currentView = view;
  document.querySelectorAll('.nav-tab').forEach(t=>t.classList.remove('active'));
  if (el) el.classList.add('active');
  else document.querySelectorAll('.nav-tab')[view==='search'?1:0].classList.add('active');

  document.getElementById('homeView').style.display = view === 'home' ? 'block' : 'none';
  document.getElementById('heroSearch').classList.toggle('visible', view === 'search');

  if (view === 'home') {
    document.getElementById('searchResultsSection').classList.remove('visible');
    document.getElementById('navSearch').value = '';
  }
}

// Modal
function openModal(dataStr) {
  const item = JSON.parse(dataStr);
  document.getElementById('modalTitle').textContent = item.title;
  document.getElementById('modalMeta').textContent = [
    item.year,
    item.mediaType === 'movie' ? 'Film' : 'Dizi',
    item.rating ? `⭐ ${item.rating}` : ''
  ].filter(Boolean).join(' · ');

  const pw = document.getElementById('modalPosterWrap');
  pw.innerHTML = item.poster
    ? `<img class="modal-poster" src="${IMG}${item.poster}" alt="${item.title}">`
    : `<div class="modal-poster-ph"><i class="ti ti-photo-off"></i></div>`;

  document.getElementById('siteList').innerHTML = SITES.map(site => {
    const href = site.url(item.title, item.origTitle, item.mediaType);
    return `<a class="site-btn" href="${href}" target="_blank" rel="noopener">
      <img class="site-icon" src="${site.icon}" alt="" onerror="this.style.display='none'">
      <div>
        <div class="site-name">${site.name}</div>
        <div class="site-desc">${site.desc}</div>
      </div>
      <i class="ti ti-external-link"></i>
    </a>`;
  }).join('');

  document.getElementById('modalBackdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) { if (e.target === document.getElementById('modalBackdrop')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modalBackdrop').classList.remove('open'); document.body.style.overflow = ''; }
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModalDirect(); });

buildSitePills();
init();
</script>
</body>
</html>
